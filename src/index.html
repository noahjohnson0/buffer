<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Buffer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
      padding: 20px;
    }

    .container {
      max-width: 100%;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #fff;
    }

    .status {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      padding: 12px;
      background: #2a2a2a;
      border-radius: 8px;
    }

    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 10px;
      background: #4a4a4a;
    }

    .status-indicator.recording {
      background: #ff4444;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text {
      font-size: 14px;
    }

    .config-section {
      margin-bottom: 20px;
    }

    .config-label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .config-input {
      width: 100%;
      padding: 10px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 14px;
    }

    .config-input:focus {
      outline: none;
      border-color: #4a9eff;
    }

    .button {
      width: 100%;
      padding: 12px;
      background: #4a9eff;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 10px;
      transition: background 0.2s;
    }

    .button:hover {
      background: #3a8eef;
    }

    .button:active {
      background: #2a7edf;
    }

    .button-secondary {
      background: #3a3a3a;
    }

    .button-secondary:hover {
      background: #4a4a4a;
    }

    .info {
      font-size: 11px;
      color: #888;
      margin-top: 5px;
    }

    .hotkey-info {
      margin-top: 20px;
      padding: 12px;
      background: #2a2a2a;
      border-radius: 8px;
      font-size: 12px;
      color: #aaa;
    }

    .hotkey-info strong {
      color: #fff;
      font-family: 'Monaco', 'Menlo', monospace;
      background: #1a1a1a;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Buffer</h1>
    
    <div class="status">
      <div class="status-indicator" id="statusIndicator"></div>
      <div class="status-text" id="statusText">Initializing...</div>
    </div>

    <div class="config-section">
      <label class="config-label" for="bufferDuration">Buffer Duration (seconds)</label>
      <input 
        type="number" 
        id="bufferDuration" 
        class="config-input" 
        min="5" 
        max="300" 
        value="30"
      />
      <div class="info">How many seconds to keep in buffer</div>
    </div>

    <div class="config-section">
      <label class="config-label" for="saveDirectory">Save Directory</label>
      <input 
        type="text" 
        id="saveDirectory" 
        class="config-input" 
        readonly
      />
      <div class="info">Where recordings are saved</div>
    </div>

    <button class="button" id="saveButton">Save Buffer Now</button>
    <button class="button button-secondary" id="openFolderButton">Open Recordings Folder</button>

    <div class="hotkey-info">
      Press <strong>⌘⇧S</strong> (Cmd+Shift+S) to save the buffer at any time
    </div>
  </div>

  <script>
    const { ipcRenderer, shell } = require('electron');
    const path = require('path');

    let config = {};

    // Load config on startup
    async function loadConfig() {
      config = await ipcRenderer.invoke('get-config');
      document.getElementById('bufferDuration').value = config.bufferDuration;
      document.getElementById('saveDirectory').value = config.saveDirectory;
      updateStatus(config.isRecording);
    }

    function updateStatus(recording) {
      const indicator = document.getElementById('statusIndicator');
      const text = document.getElementById('statusText');
      
      if (recording) {
        indicator.classList.add('recording');
        text.textContent = 'Recording...';
      } else {
        indicator.classList.remove('recording');
        text.textContent = 'Not Recording';
      }
    }

    // Update config when changed
    document.getElementById('bufferDuration').addEventListener('change', async (e) => {
      const value = parseInt(e.target.value);
      if (value >= 5 && value <= 300) {
        await ipcRenderer.invoke('update-config', { bufferDuration: value });
        config.bufferDuration = value;
      }
    });

    // Save buffer button
    document.getElementById('saveButton').addEventListener('click', async () => {
      await ipcRenderer.invoke('save-buffer-now');
    });

    // Open folder button
    document.getElementById('openFolderButton').addEventListener('click', async () => {
      const dir = document.getElementById('saveDirectory').value;
      shell.openPath(dir).catch(err => {
        console.error('Error opening folder:', err);
      });
    });

    // Listen for status updates
    ipcRenderer.on('status-update', (event, data) => {
      updateStatus(data.isRecording);
      if (data.error) {
        console.error('Recording error:', data.error);
      }
    });

    // Listen for buffer saved
    ipcRenderer.on('buffer-saved', (event, data) => {
      console.log('Buffer saved:', data.filepath);
    });

    // Load config on page load
    window.addEventListener('DOMContentLoaded', () => {
      loadConfig();
    });
  </script>
</body>
</html>
